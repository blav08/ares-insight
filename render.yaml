# Render Blueprint pro ARES Insight API (Faze 4).
# Render -> New -> Blueprint -> vyber tenhle repo. Tajne hodnoty (sync: false)
# se nastavi v dashboardu (Environment), aby nebyly v gitu.
services:
  - type: web
    name: ares-insight-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NEO4J_URI          # AuraDB: neo4j+s://<id>.databases.neo4j.io
        sync: false
      - key: NEO4J_USER         # u nekterych Aura instanci = ID instance, ne "neo4j"
        sync: false
      - key: NEO4J_PASSWORD     # heslo z AuraDB credentials
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_MODEL
        value: claude-haiku-4-5-20251001
      - key: LANGFUSE_PUBLIC_KEY
        sync: false
      - key: LANGFUSE_SECRET_KEY
        sync: false
      - key: LANGFUSE_HOST
        value: https://cloud.langfuse.com
